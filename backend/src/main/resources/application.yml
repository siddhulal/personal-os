spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lifeos}
    username: ${SPRING_DATASOURCE_USERNAME:lifeos}
    password: ${SPRING_DATASOURCE_PASSWORD:lifeos}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:h4s8K2mP9qR7vX3yB6nJ1wF5tG0dL4eA8cU2iO7rE3kM9pN6}
    expiration: 86400000

server:
  port: 8080

logging:
  level:
    root: INFO
    com.lifeos.api: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
