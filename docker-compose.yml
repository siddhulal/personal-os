services:
  postgres:
    image: postgres:15-alpine
    container_name: lifeos-db
    environment:
      POSTGRES_DB: lifeos
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifeos-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lifeos
      SPRING_DATASOURCE_USERNAME: lifeos
      SPRING_DATASOURCE_PASSWORD: lifeos
      JWT_SECRET: ${JWT_SECRET:-c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1saWZlLW9zLWFwcGxpY2F0aW9u}
      CORS_ALLOWED_ORIGINS: http://localhost:3001
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lifeos-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
