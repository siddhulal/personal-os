services:
  db:
    image: postgres:15-alpine
    container_name: lifeos-db
    environment:
      POSTGRES_DB: lifeos
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeos -d lifeos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifeos-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lifeos
      SPRING_DATASOURCE_USERNAME: lifeos
      SPRING_DATASOURCE_PASSWORD: lifeos
      JWT_SECRET: ${JWT_SECRET:-c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1saWZlLW9zLWFwcGxpY2F0aW9u}
      CORS_ALLOWED_ORIGINS: http://localhost:3002,http://localhost:3001,http://192.168.1.137:3002,http://192.168.1.137:3001,http://Mac.lan:3001,http://macmini-m4.local:3001
      AI_OLLAMA_BASE_URL: ${AI_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      AI_OLLAMA_MODEL: ${AI_OLLAMA_MODEL:-qwen3:14b}
      AI_OPENAI_API_KEY: ${AI_OPENAI_API_KEY:-}
      AI_OPENAI_MODEL: ${AI_OPENAI_MODEL:-gpt-4o}
      AI_GEMINI_API_KEY: ${AI_GEMINI_API_KEY:-}
      AI_GEMINI_MODEL: ${AI_GEMINI_MODEL:-gemini-1.5-flash}
    ports:
      - "8080:8080"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: lifeos-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3002:3000"
    depends_on:
      - backend
